name: Create YouTube Plus DIAG app

on:
  workflow_dispatch:
    inputs:

      enable_youpip:
        description: "Integrate YouPiP"
        type: boolean
        required: true
        default: false

      enable_ytuhd:
        description: "Integrate YTUHD"
        type: boolean
        required: true
        default: false

      enable_yq:
        description: "Integrate YouQuality"
        type: boolean
        required: true
        default: false

      enable_ryd:
        description: "Integrate Return YouTube Dislikes"
        type: boolean
        required: true
        default: false

      enable_demc:
        description: "Integrate DontEatMyContent"
        type: boolean
        required: true
        default: false

      ipa_url:
        description: "URL to the decrypted IPA file"
        default: ""
        required: true
        type: string

      tweak_version:
        description: "Label for the tweak version (used in filenames and apps.json description). The workflow now builds YTLite from source at HEAD of dayanch96/YTLite, so this is just a label."
        default: "5.2o"
        required: true
        type: string

      tweak_ref:
        description: "Git ref (branch, tag, or commit SHA) to build YTLite from. Defaults to main (HEAD = v5.2 source as of 2026-04-21)."
        default: "main"
        required: true
        type: string

      display_name:
        description: "App Name (Optional)"
        default: "YT-diag"
        required: true
        type: string

      bundle_id:
        description: "BundleID (Optional)"
        default: "com.google.ios.youtube.altstore.diag"
        required: true
        type: string

      info_note:
        description: "TIP: Learn more about integrations in the README via the link below"
        default: "https://github.com/dayanch96/YTLite#tweak-integration-details"
        type: string
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: 
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - name: Checkout Main
        uses: actions/checkout@v5
        with:
          path: main
          submodules: recursive

      - name: Hide sensitive inputs
        uses: levibostian/action-hide-sensitive-inputs@v1
        with:
          exclude_inputs: bundle_id,display_name,enable_demc,enable_ryd,enable_youpip,enable_yq,enable_ytuhd,info_note,tweak_version,tweak_ref

      - name: Download and validate IPA
        run: |
          wget "${{ inputs.ipa_url }}" --no-verbose -O ${{ github.workspace }}/youtube.ipa

          file_type=$(file --mime-type -b ${{ github.workspace }}/youtube.ipa)

          if [[ "$file_type" != "application/x-ios-app" && "$file_type" != "application/zip" ]]; then
            echo "::error::Validation failed: The downloaded file is not a valid IPA. Detected type: $file_type."
            exit 1
          fi

      - name: Install Dependencies
        run: brew install make ldid

      - name: Set PATH environment variable
        run: echo "$(brew --prefix make)/libexec/gnubin" >> $GITHUB_PATH

      - name: Cache Theos
        id: theos
        uses: actions/cache@v4
        env:
          cache-name: theos_cache_67db2ab
        with:
          path: theos/
          key: ${{ env.cache-name }}
          restore-keys: ${{ env.cache-name }}

      - name: Setup Theos
        if: ${{ steps.theos.outputs.cache-hit != 'true' }}
        uses: actions/checkout@v5
        with:
          repository: theos/theos
          ref: 67db2ab8d950910161730de77c322658ea3e6b44
          path: ${{ github.workspace }}/theos
          submodules: recursive

      - name: Download iOS SDK
        if: ${{ steps.theos.outputs.cache-hit != 'true' }}
        run: |
          git clone --quiet -n --depth=1 --filter=tree:0 https://github.com/theos/sdks/
          cd sdks
          git sparse-checkout set --no-cone iPhoneOS16.5.sdk
          git checkout
          mv *.sdk $THEOS/sdks
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Install cyan
        run: pipx install --force https://github.com/asdfzxcvbn/pyzule-rw/archive/main.zip

      - name: Clone YTLite source
        uses: actions/checkout@v5
        with:
          repository: dayanch96/YTLite
          ref: ${{ inputs.tweak_ref }}
          path: ${{ github.workspace }}/theos/include/YTLite

      - name: Clone Open in YouTube (Safari extension)
        run: |
          git clone --quiet -n --depth=1 --filter=tree:0 https://github.com/CokePokes/YoutubeExtensions/
          cd YoutubeExtensions
          git sparse-checkout set --no-cone OpenYoutubeSafariExtension.appex
          git checkout
          mv *.appex ${{ github.workspace }}

      - name: Clone YouTubeHeader
        run: |
          if [ -d "$THEOS/include/YouTubeHeader" ]; then
            echo "YouTubeHeader exists. Pulling latest changes..."
            cd $THEOS/include/YouTubeHeader
            git pull
          else
            echo "YouTubeHeader does not exist. Cloning repository..."
            cd $THEOS/include
            git clone --quiet --depth=1 https://github.com/PoomSmart/YouTubeHeader.git
          fi

          if [ "${{ inputs.enable_demc }}" = "true" ]; then
            echo "Copying YouTubeHeader to YTHeaders..."
            rm -rf "$THEOS/include/YTHeaders"
            cp -r "$THEOS/include/YouTubeHeader" "$THEOS/include/YTHeaders"
          fi
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Clone PSHeader
        run: |
          if [ -d "$THEOS/include/PSHeader" ]; then
            echo "PSHeader exists. Pulling latest changes..."
            cd $THEOS/include/PSHeader
            git pull
          else
            echo "PSHeader does not exist. Cloning repository..."
            cd $THEOS/include
            git clone --quiet --depth=1 https://github.com/PoomSmart/PSHeader.git
          fi
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Patch YTLite Settings.x (always insert YTLite section)
        run: |
          # In YT 21.x the value @(1) is no longer present in settingsCategoryOrder,
          # so [order indexOfObject:@(1)] returns NSNotFound and the YTLite settings
          # section is silently dropped. Force-insert it at the top as a fallback so
          # the user can always reach YTLite settings.
          python3 - <<'PY'
          import pathlib, re
          p = pathlib.Path("${{ github.workspace }}/theos/include/YTLite/Settings.x")
          src = p.read_text()
          old = ("    NSUInteger insertIndex = [order indexOfObject:@(1)];\n"
                 "    if (insertIndex != NSNotFound)\n"
                 "        [mutableOrder insertObject:@(YTLiteSection) atIndex:insertIndex + 1];")
          new = ("    NSUInteger insertIndex = [order indexOfObject:@(1)];\n"
                 "    if (insertIndex == NSNotFound) insertIndex = 0;\n"
                 "    NSUInteger target = MIN(insertIndex + 1, [mutableOrder count]);\n"
                 "    [mutableOrder insertObject:@(YTLiteSection) atIndex:target];")
          if old not in src:
              raise SystemExit("Settings.x patch target not found; source may have changed")
          p.write_text(src.replace(old, new))
          print("Patched Settings.x: YTLite section now inserts unconditionally")
          PY

      - name: TEMP — diagnostic file-based logging hooks (capture YT 21.x home feed cell classes)
        run: |
          # ytp-diag-5 pivot to file-based logging.
          # ytp-diag-4 produced zero NSLog output in Console.app despite the diag
          # build clearly running. Bundled SDK NSLog (Firebase) was visible from
          # the same process, so the routing layer is fine — either iOS privacy-
          # redacts NSLog from unsigned tweak dylibs specifically, or the hooks
          # aren't firing on the home-feed render path. File-based logging
          # removes the NSLog dependency entirely: each call writes a line to
          # Documents/ytlite-diag.log, which Jake retrieves via Finder File
          # Sharing (UIFileSharingEnabled is enabled in a later step).
          #
          # Three injections:
          # 1) Helper _yld() inserted before the first %hook block in YTLite.x.
          # 2) Top of the existing YTAsyncCollectionView.cellForItemAtIndexPath
          #    hook — unfiltered logging of every cell.
          # 3) An additional %hook block on ASCollectionView (AsyncDisplayKit
          #    base class). A class-name guard avoids double-logging when the
          #    instance is the YT subclass.
          python3 - <<'PY'
          import pathlib, re
          p = pathlib.Path("${{ github.workspace }}/theos/include/YTLite/YTLite.x")
          src = p.read_text()

          # Injection 0: file-based logging helper, inserted before the first %hook.
          helper = (
              '\n'
              '// [YTLite-DIAG] TEMPORARY — file-based logging helper.\n'
              '// Writes to NSDocumentDirectory/ytlite-diag.log. Retrieve via\n'
              '// Finder File Sharing on the diag IPA (UIFileSharingEnabled is\n'
              '// set on the IPA in a later workflow step).\n'
              '#import <stdio.h>\n'
              '#import <stdarg.h>\n'
              '#import <unistd.h>\n'
              'static FILE *_yld_fp = NULL;\n'
              'static NSLock *_yld_lock = nil;\n'
              'static void _yld_init(void) {\n'
              '    static dispatch_once_t once;\n'
              '    dispatch_once(&once, ^{\n'
              '        _yld_lock = [[NSLock alloc] init];\n'
              '        NSArray *paths = NSSearchPathForDirectoriesInDomains(NSDocumentDirectory, NSUserDomainMask, YES);\n'
              '        if (paths.count == 0) return;\n'
              '        NSString *path = [[paths firstObject] stringByAppendingPathComponent:@"ytlite-diag.log"];\n'
              '        _yld_fp = fopen([path UTF8String], "a");\n'
              '        if (_yld_fp) {\n'
              '            setvbuf(_yld_fp, NULL, _IOLBF, 0);\n'
              '            NSString *startup = [NSString stringWithFormat:@"--- ytlite-diag start %@ bundle=%@ pid=%d ---\\n",\n'
              '                                  [NSDate date], [[NSBundle mainBundle] bundleIdentifier], getpid()];\n'
              '            fputs([startup UTF8String], _yld_fp);\n'
              '            fflush(_yld_fp);\n'
              '        }\n'
              '    });\n'
              '}\n'
              'static void _yld(NSString *fmt, ...) NS_FORMAT_FUNCTION(1, 2);\n'
              'static void _yld(NSString *fmt, ...) {\n'
              '    _yld_init();\n'
              '    if (!_yld_fp) return;\n'
              '    va_list args;\n'
              '    va_start(args, fmt);\n'
              '    NSString *msg = [[NSString alloc] initWithFormat:fmt arguments:args];\n'
              '    va_end(args);\n'
              '    [_yld_lock lock];\n'
              '    if (_yld_fp) {\n'
              '        fputs([msg UTF8String], _yld_fp);\n'
              '        fputc(\'\\n\', _yld_fp);\n'
              '        fflush(_yld_fp);\n'
              '    }\n'
              '    [_yld_lock unlock];\n'
              '}\n'
              '\n'
          )
          m = re.search(r"^%hook ", src, re.MULTILINE)
          if not m:
              raise SystemExit("No %hook found in YTLite.x; cannot place helper")
          src = src[:m.start()] + helper + src[m.start():]

          # Injection 1: unfiltered file-logging in YTAsyncCollectionView hook
          anchor1 = (
              "// Remove Premium Pop-up, Horizontal Video Carousel and Shorts (https://github.com/MiRO92/YTNoShorts)\n"
              "%hook YTAsyncCollectionView\n"
              "- (id)cellForItemAtIndexPath:(NSIndexPath *)indexPath {\n"
              "    UICollectionViewCell *cell = %orig;\n"
          )
          if anchor1 not in src:
              raise SystemExit("YTAsyncCollectionView hook anchor not found")
          injected1 = (
              anchor1
              + '\n'
              '    // [YTLite-DIAG] TEMPORARY — unfiltered cell logging via _yld.\n'
              '    {\n'
              '        NSString *cellCls = NSStringFromClass([cell class]);\n'
              '        NSString *cellID = cell.accessibilityIdentifier ?: @"<nil>";\n'
              '        NSString *nodeCls = @"<no-node>";\n'
              '        NSString *nodeID = @"<no-node>";\n'
              '        if ([cell respondsToSelector:@selector(node)]) {\n'
              '            id node = [(id)cell node];\n'
              '            if (node) {\n'
              '                nodeCls = NSStringFromClass([node class]);\n'
              '                if ([node respondsToSelector:@selector(accessibilityIdentifier)]) {\n'
              '                    nodeID = [node accessibilityIdentifier] ?: @"<nil>";\n'
              '                }\n'
              '            }\n'
              '        }\n'
              '        _yld(@"[YT] sec=%ld row=%ld cellCls=%@ cellID=%@ nodeCls=%@ nodeID=%@", (long)indexPath.section, (long)indexPath.row, cellCls, cellID, nodeCls, nodeID);\n'
              '    }\n'
          )
          src = src.replace(anchor1, injected1)

          # Injection 2: append a new %hook block for ASCollectionView at the end of file
          new_hook = (
              '\n'
              '// [YTLite-DIAG] TEMPORARY hook on the AsyncDisplayKit base class to catch\n'
              '// home-feed cells in case YT 21.x uses ASCollectionView directly rather\n'
              '// than YTAsyncCollectionView. The guard avoids double-logging when the\n'
              '// instance is actually a YTAsyncCollectionView (the subclass hook fires\n'
              '// first due to ObjC dispatch).\n'
              '%hook ASCollectionView\n'
              '- (id)cellForItemAtIndexPath:(NSIndexPath *)indexPath {\n'
              '    UICollectionViewCell *cell = %orig;\n'
              '    NSString *viewCls = NSStringFromClass([self class]);\n'
              '    if (![viewCls isEqualToString:@"YTAsyncCollectionView"]) {\n'
              '        NSString *cellCls = NSStringFromClass([cell class]);\n'
              '        NSString *cellID = cell.accessibilityIdentifier ?: @"<nil>";\n'
              '        NSString *nodeCls = @"<no-node>";\n'
              '        NSString *nodeID = @"<no-node>";\n'
              '        if ([cell respondsToSelector:@selector(node)]) {\n'
              '            id node = [(id)cell node];\n'
              '            if (node) {\n'
              '                nodeCls = NSStringFromClass([node class]);\n'
              '                if ([node respondsToSelector:@selector(accessibilityIdentifier)]) {\n'
              '                    nodeID = [node accessibilityIdentifier] ?: @"<nil>";\n'
              '                }\n'
              '            }\n'
              '        }\n'
              '        _yld(@"[AS] viewCls=%@ sec=%ld row=%ld cellCls=%@ cellID=%@ nodeCls=%@ nodeID=%@", viewCls, (long)indexPath.section, (long)indexPath.row, cellCls, cellID, nodeCls, nodeID);\n'
              '    }\n'
              '    return cell;\n'
              '}\n'
              '%end\n'
          )
          src = src.rstrip() + '\n' + new_hook

          # Injection 3: append UICollectionView base-class dequeue hook (the catchall).
          # Every collection-view subclass inherits this method, including ASCollectionView
          # and any YT custom class. If a collection view dequeues a cell on screen, this
          # hook sees it. Filter offline by viewCls to find the home-feed class.
          catchall = (
              '\n'
              '// [YTLite-DIAG] TEMPORARY catchall hook on UICollectionView base class.\n'
              '// Every UICollectionView subclass uses this dequeue method, so this is\n'
              '// the broadest possible net for cell rendering. Logs view class, reuse\n'
              '// identifier, indexPath, cell class, and node class if present.\n'
              '%hook UICollectionView\n'
              '- (UICollectionViewCell *)dequeueReusableCellWithReuseIdentifier:(NSString *)identifier forIndexPath:(NSIndexPath *)indexPath {\n'
              '    UICollectionViewCell *cell = %orig;\n'
              '    NSString *viewCls = NSStringFromClass([self class]);\n'
              '    NSString *cellCls = cell ? NSStringFromClass([cell class]) : @"<nil>";\n'
              '    NSString *nodeCls = @"<no-node>";\n'
              '    NSString *nodeID = @"<no-node>";\n'
              '    if (cell && [cell respondsToSelector:@selector(node)]) {\n'
              '        id node = [(id)cell node];\n'
              '        if (node) {\n'
              '            nodeCls = NSStringFromClass([node class]);\n'
              '            if ([node respondsToSelector:@selector(accessibilityIdentifier)]) {\n'
              '                nodeID = [node accessibilityIdentifier] ?: @"<nil>";\n'
              '            }\n'
              '        }\n'
              '    }\n'
              '    _yld(@"[DEQ] viewCls=%@ reuseID=%@ sec=%ld row=%ld cellCls=%@ nodeCls=%@ nodeID=%@", viewCls, identifier, (long)indexPath.section, (long)indexPath.row, cellCls, nodeCls, nodeID);\n'
              '\n'
              '    // [YTLite-DIAG] Async followup: at dequeue time the node has not yet\n'
              '    // been bound to the cell, so [cell node] returns nil. Re-check on the\n'
              '    // next main-queue tick when binding is complete to capture the actual\n'
              '    // ASCellNode subclass. Captured via weak ref so we do not retain the\n'
              '    // cell beyond the queue cycle.\n'
              '    if (cell && [cell respondsToSelector:@selector(node)]) {\n'
              '        NSInteger sec = indexPath.section;\n'
              '        NSInteger row = indexPath.row;\n'
              '        NSString *rid = identifier ? [identifier copy] : @"<nil>";\n'
              '        NSString *vcls = viewCls ? [viewCls copy] : @"<nil>";\n'
              '        __weak UICollectionViewCell *weakCell = cell;\n'
              '        dispatch_async(dispatch_get_main_queue(), ^{\n'
              '            UICollectionViewCell *c = weakCell;\n'
              '            if (!c) return;\n'
              '            if (![c respondsToSelector:@selector(node)]) return;\n'
              '            id node = [(id)c node];\n'
              '            if (!node) return;\n'
              '            NSString *ncls = NSStringFromClass([node class]);\n'
              '            NSString *nid = @"<nil>";\n'
              '            if ([node respondsToSelector:@selector(accessibilityIdentifier)]) {\n'
              '                nid = [node accessibilityIdentifier] ?: @"<nil>";\n'
              '            }\n'
              '            _yld(@"[NDQ] viewCls=%@ reuseID=%@ sec=%ld row=%ld nodeCls=%@ nodeID=%@", vcls, rid, (long)sec, (long)row, ncls, nid);\n'
              '        });\n'
              '    }\n'
              '    return cell;\n'
              '}\n'
              '%end\n'
          )
          src = src.rstrip() + '\n' + catchall

          # Injection 4: %ctor block to verify dylib loads + class-existence diagnostics.
          # Calls _yld_init() explicitly so the log file is guaranteed to exist whether
          # or not any %hook fires. objc_lookUpClass tells us which target classes are
          # actually present in YT 21.x at runtime so we can rule out renamed classes.
          ctor_block = (
              '\n'
              '// [YTLite-DIAG] TEMPORARY ctor: writes startup marker + class-existence\n'
              '// diagnostics. If the log file exists with these CTRL lines but no DEQ\n'
              '// or YT/AS lines from scrolling, the dylib loaded but the home feed is\n'
              '// not going through UICollectionView dequeue at all.\n'
              '%ctor {\n'
              '    _yld_init();\n'
              '    _yld(@"[CTRL] ytlite tweak ctor fired pid=%d", getpid());\n'
              '    _yld(@"[CTRL] cls YTAsyncCollectionView: %@", objc_lookUpClass("YTAsyncCollectionView") ? @"FOUND" : @"NIL");\n'
              '    _yld(@"[CTRL] cls ASCollectionView: %@", objc_lookUpClass("ASCollectionView") ? @"FOUND" : @"NIL");\n'
              '    _yld(@"[CTRL] cls UICollectionView: %@", objc_lookUpClass("UICollectionView") ? @"FOUND" : @"NIL");\n'
              '    _yld(@"[CTRL] cls _ASCollectionViewCell: %@", objc_lookUpClass("_ASCollectionViewCell") ? @"FOUND" : @"NIL");\n'
              '    _yld(@"[CTRL] cls YTReelShelfCell: %@", objc_lookUpClass("YTReelShelfCell") ? @"FOUND" : @"NIL");\n'
              '    _yld(@"[CTRL] cls YTHorizontalShelfCell: %@", objc_lookUpClass("YTHorizontalShelfCell") ? @"FOUND" : @"NIL");\n'
              '    _yld(@"[CTRL] cls YTShelfCell: %@", objc_lookUpClass("YTShelfCell") ? @"FOUND" : @"NIL");\n'
              '    _yld(@"[CTRL] cls YTHorizontalCardListCell: %@", objc_lookUpClass("YTHorizontalCardListCell") ? @"FOUND" : @"NIL");\n'
              '    _yld(@"[CTRL] cls YTHorizontalButtonListCell: %@", objc_lookUpClass("YTHorizontalButtonListCell") ? @"FOUND" : @"NIL");\n'
              '    _yld(@"[CTRL] cls YTFeedEntryCell: %@", objc_lookUpClass("YTFeedEntryCell") ? @"FOUND" : @"NIL");\n'
              '    _yld(@"[CTRL] cls YTVideoFeedEntryCell: %@", objc_lookUpClass("YTVideoFeedEntryCell") ? @"FOUND" : @"NIL");\n'
              '    {\n'
              '        Class _yer = objc_lookUpClass("YTIElementRenderer");\n'
              '        if (_yer) {\n'
              '            unsigned int _cnt = 0;\n'
              '            Method *_ml = class_copyMethodList(_yer, &_cnt);\n'
              '            _yld(@"[CTRL] YTIElementRenderer direct methods (count=%u, parent=%@):", _cnt, NSStringFromClass([_yer superclass]));\n'
              '            for (unsigned int i = 0; i < _cnt; i++) {\n'
              '                _yld(@"[CTRL]   - %@", NSStringFromSelector(method_getName(_ml[i])));\n'
              '            }\n'
              '            if (_ml) free(_ml);\n'
              '        }\n'
              '    }\n'
              '    {\n'
              '        NSArray *_chainClasses = @[@"YTAsyncCollectionView", @"ASCollectionView", @"ELMCellNode", @"ELMNodeController", @"ELMContainerNode"];\n'
              '        for (NSString *clsName in _chainClasses) {\n'
              '            Class _c = objc_lookUpClass([clsName UTF8String]);\n'
              '            if (!_c) {\n'
              '                _yld(@"[CTRL] chain %@: NOT FOUND", clsName);\n'
              '                continue;\n'
              '            }\n'
              '            NSMutableArray *_chain = [NSMutableArray array];\n'
              '            Class _walk = _c;\n'
              '            while (_walk) {\n'
              '                [_chain addObject:NSStringFromClass(_walk)];\n'
              '                _walk = class_getSuperclass(_walk);\n'
              '            }\n'
              '            _yld(@"[CTRL] chain %@: %@", clsName, [_chain componentsJoinedByString:@" -> "]);\n'
              '        }\n'
              '    }\n'
              '}\n'
          )
          src = src.rstrip() + '\n' + ctor_block

          # Injection 5: log every unique description value seen inside the
          # existing YTIElementRenderer.elementData hook. ytp-diag-9 attempted
          # this via a separate %hook YTIElementRenderer description block but
          # got zero output across 646 captured lines. Hypothesis: YTIElementRenderer
          # extends GPBMessage; description is inherited from the protobuf base,
          # and Substrate's %hook may not correctly bind an inherited method on
          # a subclass when nothing on the subclass shadows it. Injecting INSIDE
          # the existing %hook YTIElementRenderer { elementData } block is a
          # known-working surface that calls [self description] unconditionally
          # at the top — if elementData fires at all in YT 21.x, this captures
          # the discriminator strings directly.
          anchor5 = "    NSString *description = [self description];\n"
          if anchor5 not in src:
              raise SystemExit("elementData anchor for ELMD injection not found")
          if src.count(anchor5) != 1:
              raise SystemExit("elementData anchor not unique; refusing to inject")
          elmd_inject = (
              anchor5
              + '\n'
              '    // [YTLite-DIAG] TEMPORARY: dedupe-log every unique description value.\n'
              '    if (description) {\n'
              '        static NSMutableSet *_elmd_seen = nil;\n'
              '        static NSLock *_elmd_lock = nil;\n'
              '        static dispatch_once_t _elmd_once;\n'
              '        dispatch_once(&_elmd_once, ^{\n'
              '            _elmd_seen = [NSMutableSet set];\n'
              '            _elmd_lock = [[NSLock alloc] init];\n'
              '        });\n'
              '        [_elmd_lock lock];\n'
              '        BOOL _isNew = ![_elmd_seen containsObject:description];\n'
              '        if (_isNew) [_elmd_seen addObject:[description copy]];\n'
              '        [_elmd_lock unlock];\n'
              '        if (_isNew) {\n'
              '            _yld(@"[ELMD] desc=%@", description);\n'
              '        }\n'
              '    }\n'
          )
          src = src.replace(anchor5, elmd_inject)

          # Injection 6: combined speculative fix + diagnostic for shorts wrapper collapse.
          # diag-11 confirmed:
          #   - YTAsyncCollectionView IS-A ASCollectionView (so our hook fires)
          #   - sizeForElement fires for ELMCellNode home feed cells
          #   - findCell-based descent through ELMNodeController returns NO for shorts
          #     (the existing findCell pattern works for the player action bar but not
          #     for shelf cells — the shorts identifiers aren't in the controller's
          #     children, they're on the cell's wrapped ELMElement directly)
          #   - ELMCellNode has an _element ivar of type ELMElement
          #
          # diag-12 path: read [cellNode._element description] and match shorts tokens
          # directly. The existing YTLite code at lines 935-976 uses
          # `containerNode.description containsString:` patterns for identifier
          # matching ("id.ui.comment_cell" etc.) so description-based matching on ELM
          # types is an established pattern. If ELMElement.description contains the
          # protobuf renderer dump (or even just identifier substrings), this works.
          # If not, the ivar dump tells us where the renderer pointer lives so we can
          # mark renderers in elementData and look them up here via that ivar.
          #
          # When ytlBool(@"hideShorts") is on and the element description matches a
          # shorts token, return CGSizeZero — that's the actual fix. Otherwise just log.
          anchor6 = (
              '%hook ASCollectionView\n'
              '- (CGSize)sizeForElement:(ASCollectionElement *)element {\n'
              '    if ([self.accessibilityIdentifier isEqualToString:@"id.video.scrollable_action_bar"]) {'
          )
          if anchor6 not in src:
              raise SystemExit("sizeForElement anchor for SZE2 injection not found")
          sze_inject = (
              '%hook ASCollectionView\n'
              '- (CGSize)sizeForElement:(ASCollectionElement *)element {\n'
              '    {\n'
              '        // [YTLite-DIAG] SZE2 — element-description-based shorts collapse + diagnosis.\n'
              '        ASCellNode *_szNode = [element node];\n'
              '        Class _szNodeCls = _szNode ? [_szNode class] : nil;\n'
              '        NSString *_szNodeClsName = _szNodeCls ? NSStringFromClass(_szNodeCls) : @"<nil>";\n'
              '        id _szElement = nil;\n'
              '        @try {\n'
              '            if (_szNode && class_getInstanceVariable(_szNodeCls, "_element")) {\n'
              '                _szElement = [_szNode valueForKey:@"_element"];\n'
              '            }\n'
              '        } @catch (NSException *_e) { _szElement = nil; }\n'
              '        NSString *_szElemCls = _szElement ? NSStringFromClass([_szElement class]) : @"<nil>";\n'
              '        NSString *_szDesc = nil;\n'
              '        if (_szElement) {\n'
              '            @try { _szDesc = [_szElement description]; } @catch (NSException *_e) { _szDesc = nil; }\n'
              '        }\n'
              '        BOOL _szMatched = NO;\n'
              '        NSString *_szMatchedToken = nil;\n'
              '        if (_szDesc) {\n'
              '            NSArray *_szTokens = @[@"shorts_video_cell.eml", @"shorts_grid_shelf_footer", @"youtube_shorts_24"];\n'
              '            for (NSString *_tok in _szTokens) {\n'
              '                if ([_szDesc containsString:_tok]) {\n'
              '                    _szMatched = YES;\n'
              '                    _szMatchedToken = _tok;\n'
              '                    break;\n'
              '                }\n'
              '            }\n'
              '        }\n'
              '        static NSMutableSet *_sze2_seen = nil;\n'
              '        static NSLock *_sze2_lock = nil;\n'
              '        static dispatch_once_t _sze2_once;\n'
              '        dispatch_once(&_sze2_once, ^{\n'
              '            _sze2_seen = [NSMutableSet set];\n'
              '            _sze2_lock = [[NSLock alloc] init];\n'
              '        });\n'
              '        NSString *_szKey = [NSString stringWithFormat:@"%@|%@|%d|%@", _szNodeClsName, _szElemCls, _szMatched, _szMatchedToken ?: @"(none)"];\n'
              '        [_sze2_lock lock];\n'
              '        BOOL _szIsNew = ![_sze2_seen containsObject:_szKey];\n'
              '        if (_szIsNew) [_sze2_seen addObject:[_szKey copy]];\n'
              '        [_sze2_lock unlock];\n'
              '        if (_szIsNew) {\n'
              '            _yld(@"[SZE2] nodeCls=%@ elemCls=%@ matched=%@ token=%@", _szNodeClsName, _szElemCls, _szMatched ? @"YES" : @"NO", _szMatchedToken ?: @"-");\n'
              '            static NSMutableSet *_elemIvarsLogged = nil;\n'
              '            static dispatch_once_t _eivOnce;\n'
              '            dispatch_once(&_eivOnce, ^{ _elemIvarsLogged = [NSMutableSet set]; });\n'
              '            @synchronized(_elemIvarsLogged) {\n'
              '                if (_szElement && ![_elemIvarsLogged containsObject:_szElemCls]) {\n'
              '                    [_elemIvarsLogged addObject:[_szElemCls copy]];\n'
              '                    Class _ec = [_szElement class];\n'
              '                    unsigned int _eivc = 0;\n'
              '                    Ivar *_eivl = class_copyIvarList(_ec, &_eivc);\n'
              '                    _yld(@"[SZE2] elem ivars for %@ (count=%u, parent=%@):", _szElemCls, _eivc, NSStringFromClass([_ec superclass]));\n'
              '                    for (unsigned int i = 0; i < _eivc; i++) {\n'
              '                        const char *iname = ivar_getName(_eivl[i]);\n'
              '                        const char *itype = ivar_getTypeEncoding(_eivl[i]);\n'
              '                        _yld(@"[SZE2]   %s : %s", iname ? iname : "?", itype ? itype : "?");\n'
              '                    }\n'
              '                    if (_eivl) free(_eivl);\n'
              '                }\n'
              '            }\n'
              '        }\n'
              '        if (ytlBool(@"hideShorts") && _szMatched) {\n'
              '            return CGSizeZero;\n'
              '        }\n'
              '    }\n'
              '    if ([self.accessibilityIdentifier isEqualToString:@"id.video.scrollable_action_bar"]) {'
          )
          src = src.replace(anchor6, sze_inject)

          # Also extend shortsToRemove tokens in diag so the elementData behavior
          # matches the stable build for apples-to-apples testing. This is the same
          # patch from main.yml.
          old_tokens = '    NSArray *shortsToRemove = @[@"shorts_shelf.eml", @"shorts_video_cell.eml", @"6Shorts"];'
          new_tokens = '    NSArray *shortsToRemove = @[@"shorts_shelf.eml", @"shorts_video_cell.eml", @"6Shorts", @"shorts_grid_shelf_footer", @"youtube_shorts_24"];'
          if old_tokens in src:
              src = src.replace(old_tokens, new_tokens)

          p.write_text(src)
          print("Diagnostic file-based logging hooks injected: _yld() helper + YT/AS cell logging + UICollectionView catchall with NDQ followup + %ctor verification with class-existence and chain dumps + ELMD inside elementData + SZE inside sizeForElement with node ivar dump")
          PY

      - name: Install roothide stub headers
        run: |
          mkdir -p "$THEOS/include/roothide"
          curl -fsSL "https://raw.githubusercontent.com/roothide/RootHideManagerApp/main/RootHide/roothide.h" -o "$THEOS/include/roothide.h"
          curl -fsSL "https://raw.githubusercontent.com/roothide/RootHideManagerApp/main/RootHide/roothide/stub.h" -o "$THEOS/include/roothide/stub.h"
          ls -la "$THEOS/include/roothide.h" "$THEOS/include/roothide/stub.h"
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Clone protobuf (objectivec headers only)
        run: |
          # Pinned to the commit used as a submodule by jkhsjdhjs/youtube-native-share.
          # Later protobuf commits removed GPBUnknownFieldSet.h which YTNativeShare.x still imports.
          PROTOBUF_REF="b8764f0941a6a5d500c48671716f0de81eb1dcaf"
          NEED_CLONE=1
          if [ -f "$THEOS/include/protobuf/objectivec/GPBUnknownFieldSet.h" ]; then
            NEED_CLONE=0
            echo "protobuf/objectivec already present with GPBUnknownFieldSet.h"
          fi
          if [ "$NEED_CLONE" = "1" ]; then
            rm -rf "$THEOS/include/protobuf"
            git clone --quiet -n --filter=tree:0 https://github.com/protocolbuffers/protobuf.git "$THEOS/include/protobuf"
            cd "$THEOS/include/protobuf"
            git sparse-checkout set --no-cone objectivec
            git checkout "$PROTOBUF_REF"
          fi
          ls "$THEOS/include/protobuf/objectivec" | grep -E "GPBUnknownFieldSet|GPBDescriptor|GPBMessage|GPBUnknownField\.h"
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Build YTLite
        run: |
          cd "$THEOS/include/YTLite"
          make clean package DEBUG=0 FINALPACKAGE=1 ADDITIONAL_CFLAGS="-DROOTHIDE_USE_STUB -Wno-deprecated-declarations -Wno-error=deprecated-declarations"
          mv packages/*.deb ${{ github.workspace }}/ytplus.deb
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Clone YouPiP
        if: ${{ inputs.enable_youpip }}
        run: |
          cd ${{ github.workspace }}
          git clone --quiet --depth=1 https://github.com/PoomSmart/YouPiP.git

      - name: Clone YTUHD
        if: ${{ inputs.enable_ytuhd }}
        uses: actions/checkout@v5
        with:
          repository: PoomSmart/YTUHD
          ref: 0f59b38817d554ab692a0053456319847a6ab1a1
          path: ${{ github.workspace }}/YTUHD

      - name: Patch YTUHD Tweak.xm with explicit Foundation import
        if: ${{ inputs.enable_ytuhd }}
        run: |
          cd ${{ github.workspace }}/YTUHD
          { echo '#import <Foundation/Foundation.h>'; cat Tweak.xm; } > Tweak.xm.new
          mv Tweak.xm.new Tweak.xm
          head -5 Tweak.xm

      - name: Clone Return-YouTube-Dislikes
        if: ${{ inputs.enable_ryd }}
        run: |
          cd ${{ github.workspace }}
          git clone --quiet --depth=1 https://github.com/PoomSmart/Return-YouTube-Dislikes.git

      - name: Clone YouGroupSettings
        run: |
          cd ${{ github.workspace }}
          git clone --quiet --depth=1 https://github.com/PoomSmart/YouGroupSettings.git

      - name: Patch YouGroupSettings to register YTLite section (789)
        run: |
          # YT 21.x moved settings to a two-level group/category UI. YouGroupSettings
          # creates the "Tweaks" group and maintains a hardcoded whitelist of category
          # IDs that get rendered under it. YTLite (789) isn't in that whitelist, so
          # its section was silently dropped. Inject @(789) at the top so YTLite
          # appears first within the Tweaks group.
          python3 - <<'PY'
          import pathlib
          p = pathlib.Path("${{ github.workspace }}/YouGroupSettings/Tweak.x")
          src = p.read_text()
          marker = "        [tweaks addObjectsFromArray:@[\n            @(404), // YTABConfig"
          if marker not in src:
              raise SystemExit("YouGroupSettings tweaks array marker not found; source may have changed")
          replacement = "        [tweaks addObjectsFromArray:@[\n            @(789), // YTLite\n            @(404), // YTABConfig"
          p.write_text(src.replace(marker, replacement))
          print("Patched YouGroupSettings: YTLite (789) now appears at top of Tweaks group")
          PY

      - name: Clone YouQuality
        if: ${{ inputs.enable_yq }}
        run: |
          cd ${{ github.workspace }}
          git clone --quiet --depth=1 https://github.com/PoomSmart/YouQuality.git

      - name: Clone YTVideoOverlay
        if: ${{ inputs.enable_yq || inputs.enable_youpip }}
        run: |
          cd ${{ github.workspace }}
          git clone --quiet --depth=1 https://github.com/PoomSmart/YTVideoOverlay.git

      - name: Clone DontEatMyContent
        if: ${{ inputs.enable_demc }}
        run: |
          cd ${{ github.workspace }}
          git clone --quiet --depth=1 --recurse-submodules https://github.com/therealFoxster/DontEatMyContent.git

      - name: Build YouPiP
        if: ${{ inputs.enable_youpip }}
        run: |
          cd ${{ github.workspace }}/YouPiP
          make clean package DEBUG=0 FINALPACKAGE=1
          mv packages/*.deb ${{ github.workspace }}/youpip.deb
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Build YTUHD
        if: ${{ inputs.enable_ytuhd }}
        run: |
          cd ${{ github.workspace }}/YTUHD
          make clean package DEBUG=0 FINALPACKAGE=1
          mv packages/*.deb ${{ github.workspace }}/ytuhd.deb
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Build Return-YouTube-Dislikes
        if: ${{ inputs.enable_ryd }}
        run: |
          cd ${{ github.workspace }}/Return-YouTube-Dislikes
          make clean package DEBUG=0 FINALPACKAGE=1
          mv packages/*.deb ${{ github.workspace }}/ryd.deb
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Build YouGroupSettings
        run: |
          cd ${{ github.workspace }}/YouGroupSettings
          make clean package DEBUG=0 FINALPACKAGE=1
          mv packages/*.deb ${{ github.workspace }}/ygs.deb
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Build YouQuality
        if: ${{ inputs.enable_yq }}
        run: |
          cd ${{ github.workspace }}/YouQuality
          make clean package DEBUG=0 FINALPACKAGE=1
          mv packages/*.deb ${{ github.workspace }}/yq.deb
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Build YTVideoOverlay
        if: ${{ inputs.enable_yq || inputs.enable_youpip }}
        run: |
          cd ${{ github.workspace }}/YTVideoOverlay
          make clean package DEBUG=0 FINALPACKAGE=1
          mv packages/*.deb ${{ github.workspace }}/ytvo.deb
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Build DontEatMyContent
        if: ${{ inputs.enable_demc }}
        run: |
          cd ${{ github.workspace }}/DontEatMyContent
          make clean package DEBUG=0 FINALPACKAGE=1
          mv packages/*.deb ${{ github.workspace }}/demc.deb
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Inject tweaks into IPA
        run: |
          tweaks="ytplus.deb OpenYoutubeSafariExtension.appex"

          for f in *.deb; do
            if [ -f "$f" ]; then
              tweaks="$tweaks $f"
            fi
          done

          cyan -i youtube.ipa -o YouTubeDiag_${{ inputs.tweak_version }}.ipa -uwef $tweaks -n "${{ inputs.display_name }}" -b ${{ inputs.bundle_id }}

      - name: Enable Finder File Sharing on diag IPA (so ytlite-diag.log is exportable)
        run: |
          # Patch the IPA's Info.plist to enable UIFileSharingEnabled +
          # LSSupportsOpeningDocumentsInPlace. This lets Jake retrieve
          # Documents/ytlite-diag.log via Finder → iPhone → Files → YT-diag → drag
          # the file to the Mac. AltStore re-signs the IPA at install time so
          # modifying Info.plist post-cyan is safe — the original signatures
          # were not valid to begin with after dylib injection.
          IPA="${{ github.workspace }}/YouTubeDiag_${{ inputs.tweak_version }}.ipa"
          TMP="$(mktemp -d)"
          unzip -q "$IPA" -d "$TMP"
          APP="$(find "$TMP/Payload" -maxdepth 2 -name "*.app" -type d | head -1)"
          if [ -z "$APP" ]; then
            echo "::error::Could not find .app bundle in IPA"
            exit 1
          fi
          PLIST="$APP/Info.plist"
          plutil -insert UIFileSharingEnabled -bool true "$PLIST" 2>/dev/null || \
            plutil -replace UIFileSharingEnabled -bool true "$PLIST"
          plutil -insert LSSupportsOpeningDocumentsInPlace -bool true "$PLIST" 2>/dev/null || \
            plutil -replace LSSupportsOpeningDocumentsInPlace -bool true "$PLIST"
          echo "Info.plist UIFileSharingEnabled = $(plutil -extract UIFileSharingEnabled raw "$PLIST")"
          echo "Info.plist LSSupportsOpeningDocumentsInPlace = $(plutil -extract LSSupportsOpeningDocumentsInPlace raw "$PLIST")"
          # Repack the IPA with the modified Info.plist
          rm "$IPA"
          (cd "$TMP" && zip -q -r "$IPA" Payload)
          ls -la "$IPA"
          rm -rf "$TMP"

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ytp-diag-${{ github.run_number }}
          name: "YouTubePlus DIAG v${{ inputs.tweak_version }} (${{ github.run_number }})"
          body: "Diagnostic build — file-based logging hook to capture YT 21.x cell class info. Lines are written to Documents/ytlite-diag.log inside the app container. Retrieve via Finder → iPhone → Files → YT-diag → drag ytlite-diag.log out. Bundle id .altstore.diag so it coexists with stable YouTube+."
          files: YouTubeDiag_${{ inputs.tweak_version }}.ipa
          draft: false

      - name: Update apps.json (DIAG entry — apps[1])
        run: |
          IPA="${{ github.workspace }}/YouTubeDiag_${{ inputs.tweak_version }}.ipa"
          SIZE=$(stat -f%z "$IPA")
          URL="https://github.com/${{ github.repository }}/releases/download/ytp-diag-${{ github.run_number }}/YouTubeDiag_${{ inputs.tweak_version }}.ipa"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Extract actual version + bundle ID from the IPA's Info.plist
          rm -rf /tmp/ipa-extract && mkdir -p /tmp/ipa-extract
          unzip -q -o "$IPA" 'Payload/*/Info.plist' -d /tmp/ipa-extract
          PLIST=$(ls /tmp/ipa-extract/Payload/*/Info.plist | head -1)
          REAL_VERSION=$(plutil -extract CFBundleShortVersionString raw "$PLIST")
          REAL_BID=$(plutil -extract CFBundleIdentifier raw "$PLIST")
          echo "IPA version: $REAL_VERSION, bundle: $REAL_BID"

          # Compose versionDescription with explicit [DIAG] prefix so it's
          # unambiguous which entry is which in AltStore.
          INTS=()
          [ "${{ inputs.enable_youpip }}" = "true" ] && INTS+=("YouPiP")
          [ "${{ inputs.enable_ytuhd }}"  = "true" ] && INTS+=("YTUHD")
          [ "${{ inputs.enable_yq }}"     = "true" ] && INTS+=("YouQuality")
          [ "${{ inputs.enable_ryd }}"    = "true" ] && INTS+=("Return YouTube Dislikes")
          [ "${{ inputs.enable_demc }}"   = "true" ] && INTS+=("DontEatMyContent")
          if [ ${#INTS[@]} -eq 0 ]; then
            INT_LIST="no extra integrations"
          else
            INT_LIST=$(IFS=, ; echo "${INTS[*]}" | sed 's/,/, /g')
          fi
          DESC="[DIAG ytp-diag-${{ github.run_number }}] YouTube ${REAL_VERSION} + YTLite v${{ inputs.tweak_version }} (${INT_LIST}). File-logging capture build — see Documents/ytlite-diag.log via Finder File Sharing. Built ${DATE}."
          echo "Description: $DESC"

          cd ${{ github.workspace }}/main
          # Update apps[1] (diagnostic). If apps[1] doesn't exist yet, jq
          # creates it as a new entry. We also seed the static fields the
          # first time so AltStore renders the entry properly.
          jq --arg v "$REAL_VERSION" \
             --arg url "$URL" \
             --arg date "$DATE" \
             --argjson size "$SIZE" \
             --arg bid "$REAL_BID" \
             --arg name "${{ inputs.display_name }}" \
             --arg desc "$DESC" \
             '.apps[1].name = $name
              | .apps[1].bundleIdentifier = $bid
              | .apps[1].developerName = "Jake (YTLite fork — DIAG)"
              | .apps[1].version = $v
              | .apps[1].versionDate = $date
              | .apps[1].size = $size
              | .apps[1].downloadURL = $url
              | .apps[1].versionDescription = $desc
              | .apps[1].localizedDescription = "Diagnostic build of YouTube+. Identical features to the stable entry, plus a temporary file-based logging hook that writes cell class info to Documents/ytlite-diag.log (retrieve via Finder → iPhone → Files → YT-diag → drag the log out) so the maintainer can identify how YT 21.x labels shorts shelves. Different bundle id from the stable build — both can be installed side by side."
              | .apps[1].iconURL = "https://raw.githubusercontent.com/dayanch96/YTLite/main/Icon.png"
              | .apps[1].tintColor = "FFAA00"' \
             apps.json > apps.json.new
          mv apps.json.new apps.json

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps.json
          if git diff --cached --quiet; then
            echo "No apps.json changes"
          else
            git commit -m "Update apps.json for ytp-diag-${{ github.run_number }}"
            git push || (git pull --rebase --autostash && git push)
          fi

      - name: Output Release URL
        run: |
          echo "::notice::Release available at: https://github.com/${{ github.repository }}/releases/tag/ytp-diag-${{ github.run_number }}"
          echo "::notice::AltStore source URL: https://raw.githubusercontent.com/${{ github.repository }}/main/apps.json"
