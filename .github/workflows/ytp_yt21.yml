name: Create yt21 (YouTube 21.x current) app

on:
  workflow_dispatch:
    inputs:

      enable_youpip:
        description: "Integrate YouPiP"
        type: boolean
        required: true
        default: false

      enable_ytuhd:
        description: "Integrate YTUHD"
        type: boolean
        required: true
        default: false

      enable_yq:
        description: "Integrate YouQuality"
        type: boolean
        required: true
        default: false

      enable_ryd:
        description: "Integrate Return YouTube Dislikes"
        type: boolean
        required: true
        default: false

      enable_demc:
        description: "Integrate DontEatMyContent"
        type: boolean
        required: true
        default: false

      ipa_url:
        description: "URL to the decrypted IPA file"
        default: ""
        required: true
        type: string

      tweak_version:
        description: "Label for the tweak version (used in filenames and apps.json description). The workflow now builds YTLite from source at HEAD of dayanch96/YTLite, so this is just a label."
        default: "5.2o"
        required: true
        type: string

      tweak_ref:
        description: "Git ref (branch, tag, or commit SHA) to build YTLite from. Defaults to main (HEAD = v5.2 source as of 2026-04-21)."
        default: "main"
        required: true
        type: string

      display_name:
        description: "App Name (Optional)"
        default: "yt21"
        required: true
        type: string

      bundle_id:
        description: "BundleID (Optional)"
        default: "com.google.ios.youtube.altstore.yt21"
        required: true
        type: string

      info_note:
        description: "TIP: Learn more about integrations in the README via the link below"
        default: "https://github.com/dayanch96/YTLite#tweak-integration-details"
        type: string
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: 
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - name: Checkout Main
        uses: actions/checkout@v5
        with:
          path: main
          submodules: recursive

      - name: Hide sensitive inputs
        uses: levibostian/action-hide-sensitive-inputs@v1
        with:
          exclude_inputs: bundle_id,display_name,enable_demc,enable_ryd,enable_youpip,enable_yq,enable_ytuhd,info_note,tweak_version,tweak_ref

      - name: Download and validate IPA
        run: |
          wget "${{ inputs.ipa_url }}" --no-verbose -O ${{ github.workspace }}/youtube.ipa

          file_type=$(file --mime-type -b ${{ github.workspace }}/youtube.ipa)

          if [[ "$file_type" != "application/x-ios-app" && "$file_type" != "application/zip" ]]; then
            echo "::error::Validation failed: The downloaded file is not a valid IPA. Detected type: $file_type."
            exit 1
          fi

      - name: Install Dependencies
        run: brew install make ldid

      - name: Set PATH environment variable
        run: echo "$(brew --prefix make)/libexec/gnubin" >> $GITHUB_PATH

      - name: Cache Theos
        id: theos
        uses: actions/cache@v4
        env:
          cache-name: theos_cache_67db2ab
        with:
          path: theos/
          key: ${{ env.cache-name }}
          restore-keys: ${{ env.cache-name }}

      - name: Setup Theos
        if: ${{ steps.theos.outputs.cache-hit != 'true' }}
        uses: actions/checkout@v5
        with:
          repository: theos/theos
          ref: 67db2ab8d950910161730de77c322658ea3e6b44
          path: ${{ github.workspace }}/theos
          submodules: recursive

      - name: Download iOS SDK
        if: ${{ steps.theos.outputs.cache-hit != 'true' }}
        run: |
          git clone --quiet -n --depth=1 --filter=tree:0 https://github.com/theos/sdks/
          cd sdks
          git sparse-checkout set --no-cone iPhoneOS16.5.sdk
          git checkout
          mv *.sdk $THEOS/sdks
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Install cyan
        run: pipx install --force https://github.com/asdfzxcvbn/pyzule-rw/archive/main.zip

      - name: Clone YTLite source
        uses: actions/checkout@v5
        with:
          repository: dayanch96/YTLite
          ref: ${{ inputs.tweak_ref }}
          path: ${{ github.workspace }}/theos/include/YTLite

      - name: Clone Open in YouTube (Safari extension)
        run: |
          git clone --quiet -n --depth=1 --filter=tree:0 https://github.com/CokePokes/YoutubeExtensions/
          cd YoutubeExtensions
          git sparse-checkout set --no-cone OpenYoutubeSafariExtension.appex
          git checkout
          mv *.appex ${{ github.workspace }}

      - name: Clone YouTubeHeader
        run: |
          if [ -d "$THEOS/include/YouTubeHeader" ]; then
            echo "YouTubeHeader exists. Pulling latest changes..."
            cd $THEOS/include/YouTubeHeader
            git pull
          else
            echo "YouTubeHeader does not exist. Cloning repository..."
            cd $THEOS/include
            git clone --quiet --depth=1 https://github.com/PoomSmart/YouTubeHeader.git
          fi

          if [ "${{ inputs.enable_demc }}" = "true" ]; then
            echo "Copying YouTubeHeader to YTHeaders..."
            rm -rf "$THEOS/include/YTHeaders"
            cp -r "$THEOS/include/YouTubeHeader" "$THEOS/include/YTHeaders"
          fi
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Clone PSHeader
        run: |
          if [ -d "$THEOS/include/PSHeader" ]; then
            echo "PSHeader exists. Pulling latest changes..."
            cd $THEOS/include/PSHeader
            git pull
          else
            echo "PSHeader does not exist. Cloning repository..."
            cd $THEOS/include
            git clone --quiet --depth=1 https://github.com/PoomSmart/PSHeader.git
          fi
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Patch YTLite Settings.x (always insert YTLite section)
        run: |
          # In YT 21.x the value @(1) is no longer present in settingsCategoryOrder,
          # so [order indexOfObject:@(1)] returns NSNotFound and the YTLite settings
          # section is silently dropped. Force-insert it at the top as a fallback so
          # the user can always reach YTLite settings.
          python3 - <<'PY'
          import pathlib, re
          p = pathlib.Path("${{ github.workspace }}/theos/include/YTLite/Settings.x")
          src = p.read_text()
          old = ("    NSUInteger insertIndex = [order indexOfObject:@(1)];\n"
                 "    if (insertIndex != NSNotFound)\n"
                 "        [mutableOrder insertObject:@(YTLiteSection) atIndex:insertIndex + 1];")
          new = ("    NSUInteger insertIndex = [order indexOfObject:@(1)];\n"
                 "    if (insertIndex == NSNotFound) insertIndex = 0;\n"
                 "    NSUInteger target = MIN(insertIndex + 1, [mutableOrder count]);\n"
                 "    [mutableOrder insertObject:@(YTLiteSection) atIndex:target];")
          if old not in src:
              raise SystemExit("Settings.x patch target not found; source may have changed")
          p.write_text(src.replace(old, new))
          print("Patched Settings.x: YTLite section now inserts unconditionally")
          PY

      - name: Patch YTLite.x for YT 21.x shorts shelf (tokens + size collapse)
        run: |
          # YT 21.x restructured the shorts shelf into three separate element
          # renderer types instead of a single wrapper:
          #   1. Header — shelf_header.eml-fe (generic, shared with other
          #      shelves like recommended channels) PLUS youtube_shorts_24
          #      (an icon resource reference unique to shorts shelf headers).
          #   2. Inner video cells — shorts_video_cell.eml-fe (already matched
          #      via existing "shorts_video_cell.eml" containsString token,
          #      ".eml" is a prefix of ".eml-fe").
          #   3. Footer — shorts_grid_shelf_footer.eml-fe (unique to shorts).
          #
          # Patch A — extend shortsToRemove token list in the elementData hook.
          # Nullifies the renderer's data so content disappears. By itself this
          # leaves blank cells in the layout (confirmed empirically on ytp-18:
          # banners + thumbnails gone, wrapper rows persist as blank space).
          #
          # Patch B — collapse blank wrapper cells to CGSizeZero. Rides on
          # YTLite's existing findCell() recursive descent (YTLite.x:650-676)
          # and the existing %hook ASCollectionView sizeForElement: pattern
          # (YTLite.x:678-699). Inserts a new branch at the top of the hook
          # that checks the cell's ELM children's descriptions for shorts
          # tokens via findCell, returning CGSizeZero on match. Gated on the
          # hideShorts user-default like the elementData path, so toggle OFF
          # leaves layout unchanged.
          #
          # The legacy YT 18.x cell-removal paths (cellForItemAtIndexPath
          # checking accessibilityIdentifier "eml.shorts-grid"/"eml.shorts-shelf",
          # and class kind YTReelShelfCell) are dead in 21.x — confirmed via
          # ytp-diag CTRL diagnostics. Leaving them in place as harmless dead
          # code; they may re-activate if YT ever reverts.
          #
          # Tokens identified via ytp-diag-10 ELMD dedupe-log capture; size
          # collapse mechanism validated against existing YTLite precedent.
          # See [[PIC - YT 21.x Shorts Shelf Cell Identification]].
          python3 - <<'PY'
          import pathlib
          p = pathlib.Path("${{ github.workspace }}/theos/include/YTLite/YTLite.x")
          src = p.read_text()

          # Patch A: extend shortsToRemove tokens
          old_tokens = '    NSArray *shortsToRemove = @[@"shorts_shelf.eml", @"shorts_video_cell.eml", @"6Shorts"];'
          new_tokens = '    NSArray *shortsToRemove = @[@"shorts_shelf.eml", @"shorts_video_cell.eml", @"6Shorts", @"shorts_grid_shelf_footer", @"youtube_shorts_24"];'
          if old_tokens not in src:
              raise SystemExit("shortsToRemove anchor not found in YTLite.x; source may have changed")
          src = src.replace(old_tokens, new_tokens)

          # Patch B: insert size-collapse branch at top of sizeForElement
          old_size = (
              '%hook ASCollectionView\n'
              '- (CGSize)sizeForElement:(ASCollectionElement *)element {\n'
              '    if ([self.accessibilityIdentifier isEqualToString:@"id.video.scrollable_action_bar"]) {'
          )
          new_size = (
              '%hook ASCollectionView\n'
              '- (CGSize)sizeForElement:(ASCollectionElement *)element {\n'
              '    // YT 21.x shorts shelf size collapse — kills blank wrapper rows whose\n'
              '    // content was nullified by the elementData hook above. Uses the same\n'
              '    // findCell ELM-descent pattern as the existing player-bar collapses.\n'
              '    if (ytlBool(@"hideShorts")) {\n'
              '        ASCellNode *node = [element node];\n'
              '        ASNodeController *nodeController = [node controller];\n'
              '        if (nodeController && findCell(nodeController, @[@"shorts_video_cell.eml", @"shorts_grid_shelf_footer", @"youtube_shorts_24"])) {\n'
              '            return CGSizeZero;\n'
              '        }\n'
              '    }\n'
              '    if ([self.accessibilityIdentifier isEqualToString:@"id.video.scrollable_action_bar"]) {'
          )
          if old_size not in src:
              raise SystemExit("sizeForElement anchor not found in YTLite.x; source may have changed")
          src = src.replace(old_size, new_size)

          p.write_text(src)
          print("Patched YTLite.x: extended shortsToRemove tokens + added sizeForElement CGSizeZero collapse for YT 21.x shorts shelf")
          PY

      - name: Install roothide stub headers
        run: |
          mkdir -p "$THEOS/include/roothide"
          curl -fsSL "https://raw.githubusercontent.com/roothide/RootHideManagerApp/main/RootHide/roothide.h" -o "$THEOS/include/roothide.h"
          curl -fsSL "https://raw.githubusercontent.com/roothide/RootHideManagerApp/main/RootHide/roothide/stub.h" -o "$THEOS/include/roothide/stub.h"
          ls -la "$THEOS/include/roothide.h" "$THEOS/include/roothide/stub.h"
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Clone protobuf (objectivec headers only)
        run: |
          # Pinned to the commit used as a submodule by jkhsjdhjs/youtube-native-share.
          # Later protobuf commits removed GPBUnknownFieldSet.h which YTNativeShare.x still imports.
          PROTOBUF_REF="b8764f0941a6a5d500c48671716f0de81eb1dcaf"
          NEED_CLONE=1
          if [ -f "$THEOS/include/protobuf/objectivec/GPBUnknownFieldSet.h" ]; then
            NEED_CLONE=0
            echo "protobuf/objectivec already present with GPBUnknownFieldSet.h"
          fi
          if [ "$NEED_CLONE" = "1" ]; then
            rm -rf "$THEOS/include/protobuf"
            git clone --quiet -n --filter=tree:0 https://github.com/protocolbuffers/protobuf.git "$THEOS/include/protobuf"
            cd "$THEOS/include/protobuf"
            git sparse-checkout set --no-cone objectivec
            git checkout "$PROTOBUF_REF"
          fi
          ls "$THEOS/include/protobuf/objectivec" | grep -E "GPBUnknownFieldSet|GPBDescriptor|GPBMessage|GPBUnknownField\.h"
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Build YTLite
        run: |
          cd "$THEOS/include/YTLite"
          make clean package DEBUG=0 FINALPACKAGE=1 ADDITIONAL_CFLAGS="-DROOTHIDE_USE_STUB -Wno-deprecated-declarations -Wno-error=deprecated-declarations"
          mv packages/*.deb ${{ github.workspace }}/ytplus.deb
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Clone YouPiP
        if: ${{ inputs.enable_youpip }}
        run: |
          cd ${{ github.workspace }}
          git clone --quiet --depth=1 https://github.com/PoomSmart/YouPiP.git

      - name: Clone YTUHD
        if: ${{ inputs.enable_ytuhd }}
        uses: actions/checkout@v5
        with:
          repository: PoomSmart/YTUHD
          ref: 0f59b38817d554ab692a0053456319847a6ab1a1
          path: ${{ github.workspace }}/YTUHD

      - name: Patch YTUHD Tweak.xm with explicit Foundation import
        if: ${{ inputs.enable_ytuhd }}
        run: |
          cd ${{ github.workspace }}/YTUHD
          { echo '#import <Foundation/Foundation.h>'; cat Tweak.xm; } > Tweak.xm.new
          mv Tweak.xm.new Tweak.xm
          head -5 Tweak.xm

      - name: Clone Return-YouTube-Dislikes
        if: ${{ inputs.enable_ryd }}
        run: |
          cd ${{ github.workspace }}
          git clone --quiet --depth=1 https://github.com/PoomSmart/Return-YouTube-Dislikes.git

      - name: Clone YouGroupSettings
        run: |
          cd ${{ github.workspace }}
          git clone --quiet --depth=1 https://github.com/PoomSmart/YouGroupSettings.git

      - name: Patch YouGroupSettings to register YTLite section (789)
        run: |
          # YT 21.x moved settings to a two-level group/category UI. YouGroupSettings
          # creates the "Tweaks" group and maintains a hardcoded whitelist of category
          # IDs that get rendered under it. YTLite (789) isn't in that whitelist, so
          # its section was silently dropped. Inject @(789) at the top so YTLite
          # appears first within the Tweaks group.
          python3 - <<'PY'
          import pathlib
          p = pathlib.Path("${{ github.workspace }}/YouGroupSettings/Tweak.x")
          src = p.read_text()
          marker = "        [tweaks addObjectsFromArray:@[\n            @(404), // YTABConfig"
          if marker not in src:
              raise SystemExit("YouGroupSettings tweaks array marker not found; source may have changed")
          replacement = "        [tweaks addObjectsFromArray:@[\n            @(789), // YTLite\n            @(404), // YTABConfig"
          p.write_text(src.replace(marker, replacement))
          print("Patched YouGroupSettings: YTLite (789) now appears at top of Tweaks group")
          PY

      - name: Clone YouQuality
        if: ${{ inputs.enable_yq }}
        run: |
          cd ${{ github.workspace }}
          git clone --quiet --depth=1 https://github.com/PoomSmart/YouQuality.git

      - name: Clone YTVideoOverlay
        if: ${{ inputs.enable_yq || inputs.enable_youpip }}
        run: |
          cd ${{ github.workspace }}
          git clone --quiet --depth=1 https://github.com/PoomSmart/YTVideoOverlay.git

      - name: Clone DontEatMyContent
        if: ${{ inputs.enable_demc }}
        run: |
          cd ${{ github.workspace }}
          git clone --quiet --depth=1 --recurse-submodules https://github.com/therealFoxster/DontEatMyContent.git

      - name: Build YouPiP
        if: ${{ inputs.enable_youpip }}
        run: |
          cd ${{ github.workspace }}/YouPiP
          make clean package DEBUG=0 FINALPACKAGE=1
          mv packages/*.deb ${{ github.workspace }}/youpip.deb
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Build YTUHD
        if: ${{ inputs.enable_ytuhd }}
        run: |
          cd ${{ github.workspace }}/YTUHD
          make clean package DEBUG=0 FINALPACKAGE=1
          mv packages/*.deb ${{ github.workspace }}/ytuhd.deb
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Build Return-YouTube-Dislikes
        if: ${{ inputs.enable_ryd }}
        run: |
          cd ${{ github.workspace }}/Return-YouTube-Dislikes
          make clean package DEBUG=0 FINALPACKAGE=1
          mv packages/*.deb ${{ github.workspace }}/ryd.deb
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Build YouGroupSettings
        run: |
          cd ${{ github.workspace }}/YouGroupSettings
          make clean package DEBUG=0 FINALPACKAGE=1
          mv packages/*.deb ${{ github.workspace }}/ygs.deb
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Build YouQuality
        if: ${{ inputs.enable_yq }}
        run: |
          cd ${{ github.workspace }}/YouQuality
          make clean package DEBUG=0 FINALPACKAGE=1
          mv packages/*.deb ${{ github.workspace }}/yq.deb
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Build YTVideoOverlay
        if: ${{ inputs.enable_yq || inputs.enable_youpip }}
        run: |
          cd ${{ github.workspace }}/YTVideoOverlay
          make clean package DEBUG=0 FINALPACKAGE=1
          mv packages/*.deb ${{ github.workspace }}/ytvo.deb
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Build DontEatMyContent
        if: ${{ inputs.enable_demc }}
        run: |
          cd ${{ github.workspace }}/DontEatMyContent
          make clean package DEBUG=0 FINALPACKAGE=1
          mv packages/*.deb ${{ github.workspace }}/demc.deb
        env:
          THEOS: ${{ github.workspace }}/theos

      - name: Inject tweaks into IPA
        run: |
          tweaks="ytplus.deb OpenYoutubeSafariExtension.appex"

          for f in *.deb; do
            if [ -f "$f" ]; then
              tweaks="$tweaks $f"
            fi
          done

          cyan -i youtube.ipa -o YouTubePlus_${{ inputs.tweak_version }}.ipa -uwef $tweaks -n "${{ inputs.display_name }}" -b ${{ inputs.bundle_id }}

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ytp-yt21-${{ github.run_number }}
          name: yt21 v${{ inputs.tweak_version }} (${{ github.run_number }})
          files: YouTubePlus_${{ inputs.tweak_version }}.ipa
          draft: false

      - name: Update apps.json for AltStore source
        run: |
          IPA="${{ github.workspace }}/YouTubePlus_${{ inputs.tweak_version }}.ipa"
          SIZE=$(stat -f%z "$IPA")
          URL="https://github.com/${{ github.repository }}/releases/download/ytp-yt21-${{ github.run_number }}/YouTubePlus_${{ inputs.tweak_version }}.ipa"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Extract actual version + bundle ID from the IPA's Info.plist
          # (CFBundleShortVersionString is YouTube's version, not the tweak's)
          rm -rf /tmp/ipa-extract && mkdir -p /tmp/ipa-extract
          unzip -q -o "$IPA" 'Payload/*/Info.plist' -d /tmp/ipa-extract
          PLIST=$(ls /tmp/ipa-extract/Payload/*/Info.plist | head -1)
          REAL_VERSION=$(plutil -extract CFBundleShortVersionString raw "$PLIST")
          REAL_BID=$(plutil -extract CFBundleIdentifier raw "$PLIST")
          echo "IPA version: $REAL_VERSION, bundle: $REAL_BID"

          # Compose versionDescription from actual integrations + tweak version
          INTS=()
          [ "${{ inputs.enable_youpip }}" = "true" ] && INTS+=("YouPiP")
          [ "${{ inputs.enable_ytuhd }}"  = "true" ] && INTS+=("YTUHD")
          [ "${{ inputs.enable_yq }}"     = "true" ] && INTS+=("YouQuality")
          [ "${{ inputs.enable_ryd }}"    = "true" ] && INTS+=("Return YouTube Dislikes")
          [ "${{ inputs.enable_demc }}"   = "true" ] && INTS+=("DontEatMyContent")
          if [ ${#INTS[@]} -eq 0 ]; then
            INT_LIST="no extra integrations"
          else
            INT_LIST=$(IFS=, ; echo "${INTS[*]}" | sed 's/,/, /g')
          fi
          DESC="[YT21 ytp-yt21-${{ github.run_number }}] YouTube ${REAL_VERSION} + YTLite v${{ inputs.tweak_version }} (${INT_LIST}) [current 21.x baseline]. Built ${DATE}."
          echo "Description: $DESC"

          cd ${{ github.workspace }}/main
          jq --arg v "$REAL_VERSION" \
             --arg url "$URL" \
             --arg date "$DATE" \
             --argjson size "$SIZE" \
             --arg bid "$REAL_BID" \
             --arg name "${{ inputs.display_name }}" \
             --arg desc "$DESC" \
             '.apps[2].version = $v
              | .apps[2].downloadURL = $url
              | .apps[2].versionDate = $date
              | .apps[2].size = $size
              | .apps[2].bundleIdentifier = $bid
              | .apps[2].name = $name
              | .apps[2].versionDescription = $desc' \
             apps.json > apps.json.new
          mv apps.json.new apps.json

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps.json
          if git diff --cached --quiet; then
            echo "No apps.json changes"
          else
            git commit -m "Update apps.json for ytp-yt21-${{ github.run_number }}"
            git push || (git pull --rebase --autostash && git push)
          fi

      - name: Output Release URL
        run: |
          echo "::notice::Release available at: https://github.com/${{ github.repository }}/releases/tag/ytp-yt21-${{ github.run_number }}"
          echo "::notice::AltStore source URL: https://raw.githubusercontent.com/${{ github.repository }}/main/apps.json"
